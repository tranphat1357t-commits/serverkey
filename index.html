<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>API KEY BRIAN</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
  color: white;

  overflow-x: hidden; /* 👈 DÁN Ở ĐÂY */
}


/* ===== LOGIN ===== */
#loginBox {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#1a0033,#660066);
}

.login-card {
  background: #120022;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* BUTTON */
button {
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(90deg,#ff00cc,#8a2be2);
  color: white;
  font-weight: bold;
  font-size: 15px;
}

/* ===== PANEL ===== */
#panel {
  display: none;
  height: 100vh;
}

/* FLEX MOBILE */
.container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* SIDEBAR -> MOBILE TOP MENU */
.sidebar {
  position: fixed;
  top: 0;
  left: -280px; /* 👈 tăng thêm để ẩn hẳn */
  width: 260px;
  height: 100%;
  background: linear-gradient(180deg, #020617, #0f172a, #1e293b);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: 0.3s ease;
  z-index: 99999;
}



.sidebar.active {
  left: 0;
}

.sidebar button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}


/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
}

/* CARD */
.card {
  background: #120022;
  padding: 25px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  text-align: center;
}

/* CREATE CARD */
.create-card {
  width: 100%;
  max-width: 500px;
  padding: 30px;
  border-radius: 20px;
  background: linear-gradient(145deg, #020617, #0f172a);
  box-shadow: 0 0 30px #ff00cc55;
  text-align: center;
}

.create-card h1 {
  font-size: 24px;
  margin-bottom: 20px;
}

/* FORM */
.form-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* SELECT */
.form-row select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #2a2a2a;
  color: white;
}

/* BUTTON */
.form-row button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
}

/* RESULT */
.result-box {
  margin-top: 20px;
}

.key {
  font-size: 18px;
  color: #00ffcc;
  word-break: break-all;
}

/* LIST */
.list {
  text-align: left;
  max-height: 250px;
  overflow: auto;
  font-size: 14px;
}

/* TAB */
.tab {
  display: none;
}

.active {
  display: flex;
}

/* ===== DESKTOP (>=768px) ===== */
@media (min-width: 768px) {

  .container {
    flex-direction: row;
  }

  .sidebar {
    width: 220px;
    flex-direction: column;
  }

  .sidebar h2 {
    display: block;
  }

  .sidebar button {
    width: 100%;
  }

  .form-row {
    flex-direction: row;
  }

  .form-row button {
    width: auto;
  }
}
/* ===== FILE UI UPGRADE ===== */

.file-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  margin-top: 15px;
}

@media (min-width: 768px) {
  .file-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.file-card {
  background: linear-gradient(145deg, #020617, #0f172a);
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 0 20px #00000050;
  transition: 0.3s;
}

.file-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 25px #00ccff55;
}


</style>
</head>

<body>

<button id="openMenu" style="
  position:fixed;
  top:15px;
  left:15px;
  z-index:100000;
  background:#000;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
">
☰
</button>


<!-- LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2>🔐 Đăng nhập</h2>
    <input id="user" placeholder="Tài khoản">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <p id="err" style="color:red"></p>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="container">

    <!-- MENU -->
    <div class="sidebar">
      <button onclick="document.querySelector('.sidebar').classList.remove('active')" 
style="background:none;font-size:20px;">✖</button>

      <h2>API KEY BRIAN</h2>
      <button onclick="showTab('create')">🔑 Tạo Key</button>
      <button onclick="showTab('files')">📂 Link File</button>
      <button onclick="showTab('device')">💻 Thông tin máy</button>
      <button onclick="showTab('history')">📜 Lịch sử key</button>
      <button onclick="showTab('loginlog')">🔐 Lịch sử login</button>
      <button onclick="logout()">🚪 Đăng xuất</button>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- CREATE -->
<div id="tab-create" class="tab active">
  <div class="create-wrapper">

    <div class="create-card">
      <h1>🔑 Tạo Key</h1>

      <div class="form-row">
        <select id="days">
          <option value="1">1 ngày</option>
          <option value="3">3 ngày</option>
          <option value="7">7 ngày</option>
          <option value="10">10 ngày</option>
          <option value="15">15 ngày</option>
          <option value="20">20 ngày</option>
          <option value="25">25 ngày</option>
          <option value="30">30 ngày</option>
          <option value="365">365 ngày</option>
        </select>
         <input id="maxDevices" type="number" placeholder="Số thiết bị (1-200)" min="1" max="200">


        <button onclick="createKey()">Tạo Key</button>
      </div>

      <div class="result-box">
       <div id="result" class="key"></div>
       <button onclick="copyKey()" style="
         margin-top:10px;
         background:#00ccff;
       ">
    📋 Sao chép
      </button>
        <div id="expire"></div>
</div>


    </div>

  </div>
</div>
      <!-- FILE LINKS -->
<div id="tab-files" class="card tab">
  <h2>📂 Link File</h2>

  <!-- Brian -->
  <h3>🧠 Brian</h3>
  <div class="list">
    <div>
      📥 <a href="https://www.mediafire.com/file/yp74fokeoqdql19/HyperHead.apk/file" target="_blank">
        HyperHead APK
      </a>
    </div>
    <div>
      ⚙️ <a href="https://www.mediafire.com/file/p92vmbjbwbe9jxw/BRIAN+X+MEW.mobileconfig/file" target="_blank">
        HyperHead Config
      </a>
    </div>
  </div>

  <hr>

  <!-- Tuấn Anh -->
  <h3>🍎 Tuấn Anh IOS</h3>
  <div class="list">
    <div>
      📥 <a href="https://www.mediafire.com/file/9hsrqfot7pk91yv/𝐀𝐈𝐌𝐋𝐎𝐂𝐊𝐌𝐎𝐃𝐄.apk/file" target="_blank">
        𝐀𝐈𝐌𝐋𝐎𝐂𝐊𝐌𝐎𝐃𝐄 APK
      </a>
    </div>
    <div>
      ⚙️ <a href="https://www.mediafire.com/file/u3spzo6ok3yegv1/𝐀𝐈𝐌𝐋𝐎𝐂𝐊𝐌𝐎𝐃𝐄.mobileconfig/file" target="_blank">
        𝐀𝐈𝐌𝐋𝐎𝐂𝐊𝐌𝐎𝐃𝐄 Config
      </a>
    </div>
  </div>

  <hr>

  <!-- Minh Nhật -->
  <h3>🔥 Minh Nhật IOS</h3>
  <div class="list">
    <div>
      📥 <a href="https://www.mediafire.com/file/1krpe0dpgo4k8bl/AimHeadMinhNhat.apk/file" target="_blank">
        AimHead APK
      </a>
    </div>
    <div>
      ⚙️ <a href="https://www.mediafire.com/file/1krpe0dpgo4k8bl/AimHeadMinhNhat.apk/file" target="_blank">
        AimHead Config
      </a>
    </div>
  </div>

</div>



      <!-- DEVICE -->
      <div id="tab-device" class="card tab">
        <h2>💻 Thông tin máy</h2>
        <div id="deviceInfo"></div>
      </div>

      <!-- HISTORY KEY -->
      <div id="tab-history" class="card tab">
        <h2>📜 Lịch sử tạo key</h2>
        <div id="historyList" class="list"></div>
      </div>

      <!-- LOGIN LOG -->
      <div id="tab-loginlog" class="card tab">
        <h2>🔐 Lịch sử login</h2>
        <div id="loginList" class="list"></div>
      </div>

    </div>
  </div>
</div>

<script>
const ACCOUNTS = [
  { user: "minhnhatonetop@gmail.com", pass: "minh123456" },
  { user: "tuanankkvu@gmail.com", pass: "op2009" },
  { user: "brian", pass: "14072008" }
];


/* LOGIN */
function login() {
  const u = user.value;
  const p = pass.value;

  const found = ACCOUNTS.find(acc => acc.user === u && acc.pass === p);

  if (found) {
    localStorage.setItem("login", "ok");

    let logs = JSON.parse(localStorage.getItem("loginLogs") || "[]");
    logs.push(u + " - " + new Date().toLocaleString());
    localStorage.setItem("loginLogs", JSON.stringify(logs));

    init();
  } else {
    err.innerText = "Sai tài khoản!";
  }
}


function logout() {
  localStorage.removeItem("login");
  location.reload();
}

/* INIT */
function init() {
  loginBox.style.display = "none";
  panel.style.display = "block";

  loadDevice();
  loadHistory();
  loadLoginLog();
}

/* TAB */
function showTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
}

/* CREATE KEY */
async function createKey() {
  const days = document.getElementById("days").value;
  let maxDevices = parseInt(document.getElementById("maxDevices").value || "1");

  if (maxDevices < 1 || maxDevices > 200) {
    alert("Số thiết bị phải từ 1-200");
    return;
  }

  const res = await fetch(
    `https://api-server-key.tranphat1357t.workers.dev/api/create?admin=BRIAN_2008&days=${days}&maxDevices=${maxDevices}`
  );

  const data = await res.json();

  if (data.ok) {
    result.innerText = data.key;

    if (data.data.expiresAt) {
      expire.innerText = "Hết hạn: " + new Date(data.data.expiresAt).toLocaleString();
    }

    let history = JSON.parse(localStorage.getItem("keyHistory") || "[]");
    history.push({
      key: data.key,
      time: new Date().toLocaleString(),
      devices: maxDevices
    });
    localStorage.setItem("keyHistory", JSON.stringify(history));

    loadHistory();
  }
}


/* HISTORY */
function loadHistory() {
  let h = JSON.parse(localStorage.getItem("keyHistory") || "[]");

  historyList.innerHTML = h.map(x => `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      
      <div>
        🔑 ${x.key}<br>
        🕒 ${x.time}
      </div>

      <button onclick="revokeKey('${x.key}')" 
        style="
          background:red;
          padding:8px 12px;
          border-radius:8px;
          font-size:12px;
        ">
        Khóa Key
      </button>

    </div>
    <hr>
  `).join("");
}


/* LOGIN LOG */
function loadLoginLog() {
  let l = JSON.parse(localStorage.getItem("loginLogs") || "[]");

  loginList.innerHTML = l.map(x =>
    `<div>🟢 ${x}</div><hr>`
  ).join("");
}

/* DEVICE */
function loadDevice() {
  deviceInfo.innerHTML = `
  🌐 ${navigator.userAgent}<br><br>
  💻 ${navigator.platform}<br><br>
  🌍 ${navigator.language}
  `;
}
  // ===== REVOKE KEY =====
async function revokeKey(key) {
  if (!confirm("Bạn chắc chắn muốn khóa key này?")) return;

  const res = await fetch(
    `https://api-server-key.tranphat1357t.workers.dev/api/revoke?admin=BRIAN_2008&key=${key}`
  );

  const data = await res.json();

  if (data.ok) {
    alert("✅ Đã khóa key: " + key);
  } else {
    alert("❌ Lỗi: " + data.error);
  }
}
function copyKey() {
  const key = document.getElementById("result").innerText;

  if (!key) {
    alert("Chưa có key để copy!");
    return;
  }

  navigator.clipboard.writeText(key)
    .then(() => {
      alert("✅ Đã sao chép key!");
    })
    .catch(() => {
      alert("❌ Không thể sao chép!");
    });
}

/* AUTO LOGIN */
if (localStorage.getItem("login") === "ok") {
  init();
}
window.addEventListener("load", () => {
  const sidebar = document.querySelector(".sidebar");
  const openBtn = document.getElementById("openMenu");

  openBtn.onclick = () => {
    sidebar.classList.add("active");
  };

  document.addEventListener("click", (e) => {
    if (!sidebar.contains(e.target) && e.target !== openBtn) {
      sidebar.classList.remove("active");
    }
  });
});

</script>

</body>
</html>
