<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>VIP PANEL</title>

<!-- FONT ĐẸP -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg, #1a0033, #2d0066, #ff00cc);
  color: white;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 20px;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 30px;
  color: #ff66ff;
}

.menu button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.3s;
}

.menu button:hover {
  background: linear-gradient(45deg, #ff00cc, #9900ff);
}

/* ===== CONTENT ===== */
.content {
  flex: 1;
  display: flex;
  justify-content: center;   /* ngang */
  align-items: center;       /* dọc */
  padding: 40px;
}


/* CARD */
.card {
  width: 100%;
  max-width: 500px;
}


h2 {
  margin-bottom: 20px;
  font-size: 28px;
}

/* INPUT + SELECT */
select, button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

select {
  width: 100%;
}

/* BUTTON */
.create-btn {
  width: 100%;
  margin-top: 15px;
  background: linear-gradient(45deg, #ff00cc, #9900ff);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

/* RESULT */
.result {
  margin-top: 20px;
}

.key {
  font-size: 22px;
  color: #00ffcc;
  font-weight: bold;
}

.expire {
  color: #ffccff;
}

/* HISTORY */
.list {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">⚡ SERVER API  BRIAN CHEAT</div>

  <div class="menu">
    <button onclick="show('create')">🔑 Tạo Key</button>
    <button onclick="show('device')">💻 Thông tin máy</button>
    <button onclick="show('history')">📜 Lịch sử key</button>
    <button onclick="show('login')">🔐 Lịch sử login</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- CREATE -->
  <div id="create" class="card">
    <h2>🔑 Tạo Key</h2>

    <select id="days">
      <option value="1">1 ngày</option>
      <option value="3">3 ngày</option>
      <option value="30">30 ngày</option>
      <option value="365">365 ngày</option>
    </select>

    <button class="create-btn" onclick="createKey()">Tạo Key</button>

    <div class="result">
      <div class="key" id="key"></div>
      <div class="expire" id="expire"></div>
    </div>
  </div>

  <!-- DEVICE -->
  <div id="device" class="card" style="display:none">
    <h2>💻 Thông tin máy</h2>
    <div id="deviceInfo"></div>
  </div>

  <!-- HISTORY -->
  <div id="history" class="card" style="display:none">
    <h2>📜 Lịch sử key</h2>
    <div id="historyList" class="list"></div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="card" style="display:none">
    <h2>🔐 Lịch sử login</h2>
    <div id="loginList" class="list"></div>
  </div>

</div>

<script>
const API = "https://api-server-key.tranphat1357t.workers.dev";
const ADMIN = "BRIAN_2008";

// ===== CHUYỂN TAB =====
function show(id) {
  ["create","device","history","login"].forEach(x=>{
    document.getElementById(x).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

// ===== TẠO KEY =====
async function createKey() {
  const days = document.getElementById("days").value;

  const res = await fetch(`${API}/api/create?admin=${ADMIN}&days=${days}`);
  const data = await res.json();

  if (!data.ok) {
    alert("Lỗi tạo key");
    return;
  }

  document.getElementById("key").innerText = data.key;

  if (data.data.expiresAt) {
    const d = new Date(data.data.expiresAt);
    document.getElementById("expire").innerText =
      "Hết hạn: " + d.toLocaleString();
  } else {
    document.getElementById("expire").innerText = "Vĩnh viễn";
  }

  saveHistory(data.key);
}

// ===== LƯU HISTORY =====
function saveHistory(key) {
  let list = JSON.parse(localStorage.getItem("history") || "[]");
  list.push({ key, time: new Date().toLocaleString() });
  localStorage.setItem("history", JSON.stringify(list));
  renderHistory();
}

// ===== HIỂN THỊ HISTORY =====
function renderHistory() {
  const list = JSON.parse(localStorage.getItem("history") || "[]");
  document.getElementById("historyList").innerHTML =
    list.map(x => `🔑 ${x.key} - ${x.time}`).join("<br>");
}

// ===== DEVICE INFO =====
function loadDevice() {
  document.getElementById("deviceInfo").innerHTML = `
    OS: ${navigator.platform} <br>
    Browser: ${navigator.userAgent} <br>
    Language: ${navigator.language}
  `;
}

// ===== LOGIN HISTORY =====
function saveLogin() {
  let list = JSON.parse(localStorage.getItem("login") || "[]");
  list.push(new Date().toLocaleString());
  localStorage.setItem("login", JSON.stringify(list));
}

function renderLogin() {
  const list = JSON.parse(localStorage.getItem("login") || "[]");
  document.getElementById("loginList").innerHTML =
    list.map(x => `🕒 ${x}`).join("<br>");
}

// INIT
loadDevice();
renderHistory();
renderLogin();
saveLogin();
</script>

</body>
</html>
