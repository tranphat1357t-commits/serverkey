<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SERVER API</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#2b0066,#ff00cc);
  color: white;
}

/* ===== LOGIN ===== */
#loginBox {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#1a0033,#660066);
}

.login-card {
  background: #120022;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 30px #ff00cc66;
}

.login-card h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg,#ff00cc,#8a2be2);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* ===== PANEL ===== */
#panel {
  display: none;
  height: 100vh;
  display: flex;
}

.sidebar {
  width: 250px;
  background: #14002a;
  padding: 20px;
}

.sidebar h2 {
  color: #ff66ff;
}

.menu {
  margin-top: 30px;
}

.menu button {
  margin: 10px 0;
}

.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: #120022;
  padding: 40px;
  border-radius: 20px;
  width: 400px;
  text-align: center;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.key {
  color: #00ffcc;
  font-size: 20px;
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- ===== LOGIN ===== -->
<div id="loginBox">
  <div class="login-card">
    <h2>🔐 Đăng nhập</h2>
    <input id="user" placeholder="Tài khoản">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <p id="err" style="color:red"></p>
  </div>
</div>

<!-- ===== PANEL ===== -->
<div id="panel">
  <div class="sidebar">
    <h2>⚡ PANEL</h2>
    <div class="menu">
      <button>Tạo Key</button>
      <button onclick="logout()">Đăng xuất</button>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <h2>🔑 Tạo Key</h2>

      <select id="days">
        <option value="1">1 ngày</option>
        <option value="3">3 ngày</option>
        <option value="30">30 ngày</option>
        <option value="365">365 ngày</option>
      </select>

      <button onclick="createKey()">Tạo Key</button>

      <div class="key" id="result"></div>
      <div id="expire"></div>
    </div>
  </div>
</div>

<script>
const USER = "admin";
const PASS = "123456";

/* ===== LOGIN ===== */
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === USER && p === PASS) {
    localStorage.setItem("login", "ok");
    showPanel();
  } else {
    document.getElementById("err").innerText = "Sai tài khoản hoặc mật khẩu";
  }
}

function logout() {
  localStorage.removeItem("login");
  location.reload();
}

function showPanel() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("panel").style.display = "flex";
}

/* ===== AUTO LOGIN ===== */
if (localStorage.getItem("login") === "ok") {
  showPanel();
}

/* ===== CREATE KEY ===== */
async function createKey() {
  const days = document.getElementById("days").value;

  const res = await fetch(`https://api-server-key.tranphat1357t.workers.dev/api/create?admin=BRIAN_2008&days=${days}`);
  const data = await res.json();

  if (data.ok) {
    document.getElementById("result").innerText = data.key;

    if (data.data.expiresAt) {
      const d = new Date(data.data.expiresAt);
      document.getElementById("expire").innerText =
        "Hết hạn: " + d.toLocaleString();
    } else {
      document.getElementById("expire").innerText = "Vĩnh viễn";
    }

    // lưu lịch sử
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    history.push({
      key: data.key,
      time: new Date().toLocaleString()
    });
    localStorage.setItem("history", JSON.stringify(history));
  }
}
</script>

</body>
</html>
