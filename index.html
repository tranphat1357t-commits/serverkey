<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SERVER KEY PANEL</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#2b0066,#ff00cc);
  color: white;
}

/* ===== LOGIN ===== */
#loginBox {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#1a0033,#660066);
}

.login-card {
  background: #120022;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(90deg,#ff00cc,#8a2be2);
  color: white;
  font-weight: bold;
}

/* ===== PANEL ===== */
#panel {
  display: none;
  height: 100vh;
}

.container {
  display: flex;
  height: 100%;
}

/* sidebar */
.sidebar {
  width: 230px;
  background: #14002a;
  padding: 20px;
}

.sidebar h2 {
  color: #ff66ff;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
}

/* main */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: #120022;
  padding: 40px;
  border-radius: 20px;
  width: 420px;
  text-align: center;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.key {
  color: #00ffcc;
  font-size: 20px;
  margin-top: 15px;
}

.tab {
  display: none;
}

.active {
  display: flex;
}

/* list */
.list {
  text-align: left;
  max-height: 300px;
  overflow: auto;
}
  /* ===== CENTER WRAPPER ===== */
.create-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== CARD ===== */
.create-card {
  width: 550px;
  padding: 50px;
  border-radius: 25px;
  background: linear-gradient(145deg,#14002a,#1f003d);
  box-shadow: 0 0 40px #ff00cc55;
  text-align: center;
  animation: fadeIn 0.4s ease;
}

.create-card h1 {
  font-size: 32px;
  margin-bottom: 30px;
}

/* ===== FORM ===== */
.form-row {
  display: flex;
  gap: 15px;
}

/* SELECT */
.form-row select {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #2a2a2a;
  color: white;
}

/* BUTTON */
.form-row button {
  padding: 15px 25px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(90deg,#ff00cc,#8a2be2);
  cursor: pointer;
  transition: 0.3s;
}

.form-row button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00cc;
}

/* RESULT */
.result-box {
  margin-top: 25px;
}

.key {
  font-size: 22px;
  color: #00ffcc;
  margin-bottom: 10px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2>🔐 Đăng nhập</h2>
    <input id="user" placeholder="Tài khoản">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <p id="err" style="color:red"></p>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="container">

    <!-- MENU -->
    <div class="sidebar">
      <h2>⚡ PANEL</h2>
      <button onclick="showTab('create')">🔑 Tạo Key</button>
      <button onclick="showTab('device')">💻 Thông tin máy</button>
      <button onclick="showTab('history')">📜 Lịch sử key</button>
      <button onclick="showTab('loginlog')">🔐 Lịch sử login</button>
      <button onclick="logout()">🚪 Đăng xuất</button>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- CREATE -->
<div id="tab-create" class="tab active">
  <div class="create-wrapper">

    <div class="create-card">
      <h1>🔑 Tạo Key</h1>

      <div class="form-row">
        <select id="days">
          <option value="1">1 ngày</option>
          <option value="3">3 ngày</option>
          <option value="30">30 ngày</option>
          <option value="365">365 ngày</option>
        </select>

        <button onclick="createKey()">Tạo Key</button>
      </div>

      <div class="result-box">
        <div id="result" class="key"></div>
        <div id="expire"></div>
      </div>

    </div>

  </div>
</div>


      <!-- DEVICE -->
      <div id="tab-device" class="card tab">
        <h2>💻 Thông tin máy</h2>
        <div id="deviceInfo"></div>
      </div>

      <!-- HISTORY KEY -->
      <div id="tab-history" class="card tab">
        <h2>📜 Lịch sử tạo key</h2>
        <div id="historyList" class="list"></div>
      </div>

      <!-- LOGIN LOG -->
      <div id="tab-loginlog" class="card tab">
        <h2>🔐 Lịch sử login</h2>
        <div id="loginList" class="list"></div>
      </div>

    </div>
  </div>
</div>

<script>
const USER = "admin";
const PASS = "123456";

/* LOGIN */
function login() {
  if (user.value === USER && pass.value === PASS) {
    localStorage.setItem("login", "ok");

    let logs = JSON.parse(localStorage.getItem("loginLogs") || "[]");
    logs.push(new Date().toLocaleString());
    localStorage.setItem("loginLogs", JSON.stringify(logs));

    init();
  } else {
    err.innerText = "Sai tài khoản!";
  }
}

function logout() {
  localStorage.removeItem("login");
  location.reload();
}

/* INIT */
function init() {
  loginBox.style.display = "none";
  panel.style.display = "block";

  loadDevice();
  loadHistory();
  loadLoginLog();
}

/* TAB */
function showTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
}

/* CREATE KEY */
async function createKey() {
  const days = document.getElementById("days").value;

  const res = await fetch(`https://api-server-key.tranphat1357t.workers.dev/api/create?admin=BRIAN_2008&days=${days}`);
  const data = await res.json();

  if (data.ok) {
    result.innerText = data.key;

    if (data.data.expiresAt) {
      expire.innerText = "Hết hạn: " + new Date(data.data.expiresAt).toLocaleString();
    }

    let history = JSON.parse(localStorage.getItem("keyHistory") || "[]");
    history.push({
      key: data.key,
      time: new Date().toLocaleString()
    });
    localStorage.setItem("keyHistory", JSON.stringify(history));

    loadHistory();
  }
}

/* HISTORY */
function loadHistory() {
  let h = JSON.parse(localStorage.getItem("keyHistory") || "[]");

  historyList.innerHTML = h.map(x =>
    `<div>🔑 ${x.key}<br>🕒 ${x.time}</div><hr>`
  ).join("");
}

/* LOGIN LOG */
function loadLoginLog() {
  let l = JSON.parse(localStorage.getItem("loginLogs") || "[]");

  loginList.innerHTML = l.map(x =>
    `<div>🟢 ${x}</div><hr>`
  ).join("");
}

/* DEVICE */
function loadDevice() {
  deviceInfo.innerHTML = `
  🌐 ${navigator.userAgent}<br><br>
  💻 ${navigator.platform}<br><br>
  🌍 ${navigator.language}
  `;
}

/* AUTO LOGIN */
if (localStorage.getItem("login") === "ok") {
  init();
}
</script>

</body>
</html>
